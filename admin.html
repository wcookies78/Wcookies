<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Cookies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#FBF3E7; --cream-dark:#F2E5D3; --cocoa:#3E2723; --cocoa-light:#8A6E63; --caramel:#C17A3F; --caramel-dark:#9C5E2C; --sage:#6E8C63; --paper:#FFFDF9; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Work Sans', sans-serif; background:var(--cream); color:var(--cocoa); padding:0 0 3rem;}
  h1,h2{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .wrap{max-width:900px; margin:0 auto; padding:0 20px;}
  header{padding:2rem 0 1rem; text-align:center;}
  section{margin-top:2rem;}
  section h2{font-size:1.2rem; margin-bottom:12px;}
  .card{background:var(--paper); border:1px solid var(--cream-dark); border-radius:12px; padding:16px;}
  table{width:100%; border-collapse:collapse;}
  th, td{padding:8px 10px; text-align:left; font-size:0.88rem; border-bottom:1px solid var(--cream-dark); vertical-align:middle;}
  th{color:var(--cocoa-light); font-weight:500;}
  input[type=text], input[type=number], select{width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--cream-dark); background:var(--cream); font-family:inherit; font-size:0.88rem;}
  .status-badge{padding:4px 10px; border-radius:20px; font-size:0.75rem; border:none;}
  .status-badge.active{background:#EEF3EB; color:var(--sage);}
  .status-badge.inactive{background:#F2E5D3; color:var(--cocoa-light);}
  button{padding:8px 14px; border-radius:8px; border:1px solid var(--cream-dark); background:var(--cream); font-family:inherit; font-size:0.85rem; cursor:pointer;}
  button:hover{background:var(--cream-dark);}
  .btn-primary{background:var(--caramel); color:var(--paper); border:none;}
  .btn-primary:hover{background:var(--caramel-dark);}
  .btn-danger{color:#A32D2D;}
  .add-row{display:grid; grid-template-columns:2fr 3fr 1fr auto; gap:8px; margin-top:14px; align-items:center;}
  .status-pill{padding:4px 10px; border-radius:20px; font-size:0.75rem; cursor:pointer; border:none;}
  .status-pill.pending{background:#FBEBD8; color:var(--caramel-dark);}
  .status-pill.done{background:#EEF3EB; color:var(--sage);}
  .amount{font-family:'IBM Plex Mono', monospace;}
  .empty{color:var(--cocoa-light); font-style:italic; padding:12px 0;}
  .gate{max-width:320px; margin:4rem auto; text-align:center;}
  .gate input{margin:12px 0; text-align:center;}
  .history-total{margin-top:10px; text-align:right; font-family:'IBM Plex Mono', monospace; color:var(--cocoa-light); font-size:0.9rem;}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🍪 Admin</h1></header>

  <div id="gate" class="gate">
    <p>Mot de passe admin</p>
    <input type="text" id="pwInput" placeholder="Mot de passe">
    <br><button class="btn-primary" id="pwBtn">Entrer</button>
    <p id="pwError" style="color:#A32D2D; font-size:0.85rem; display:none;">Mot de passe incorrect.</p>
  </div>

  <div id="adminContent" style="display:none;">
    <section>
      <h2>Produits</h2>
      <div class="card">
        <table id="productsTable">
          <thead><tr><th>Nom</th><th>Description</th><th>Prix (€)</th><th></th></tr></thead>
          <tbody id="productsBody"></tbody>
        </table>
        <div class="add-row">
          <input type="text" id="newName" placeholder="Nom du cookie">
          <input type="text" id="newDesc" placeholder="Description">
          <input type="number" id="newPrice" placeholder="Prix" step="0.1">
          <button class="btn-primary" id="addBtn">Ajouter</button>
        </div>
      </div>
    </section>

    <section>
      <h2>Réglages livraison</h2>
      <div class="card">
        <div class="add-row" style="grid-template-columns:2fr 1fr;">
          <div>Frais de livraison (€)</div>
          <input type="number" id="deliveryFeeInput" step="0.1">
        </div>
        <div style="margin-top:12px;">
          <button class="btn-primary" id="saveDeliveryFeeBtn">Enregistrer</button>
          <span id="deliveryFeeMsg" style="font-size:0.85rem; color:var(--sage); margin-left:8px;"></span>
        </div>
      </div>
    </section>

    <section>
      <h2>Codes promo</h2>
      <div class="card">
        <table id="promoTable">
          <thead><tr><th>Code</th><th>Type</th><th>Valeur</th><th>Seuil min.</th><th>Utilisations</th><th>Expire</th><th>Actif</th><th></th></tr></thead>
          <tbody id="promoBody"></tbody>
        </table>
        <div style="margin-top:16px; display:grid; grid-template-columns:1.2fr 1.3fr 1fr; gap:10px;">
          <input type="text" id="newPromoCode" placeholder="Code (ex: PROMO10)">
          <select id="newPromoType">
            <option value="percent">Pourcentage %</option>
            <option value="fixed">Montant fixe €</option>
            <option value="free_delivery">Livraison offerte</option>
          </select>
          <input type="number" id="newPromoValue" placeholder="Valeur (% ou €)" step="0.1">
        </div>
        <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
          <input type="number" id="newPromoMinSubtotal" placeholder="Seuil min. (€), 0 = aucun" step="0.1">
          <input type="number" id="newPromoMaxUses" placeholder="Utilisations max (vide = illimité)" min="1">
          <input type="date" id="newPromoExpires">
        </div>
        <div style="margin-top:12px;">
          <button class="btn-primary" id="addPromoBtn">Ajouter le code</button>
        </div>
      </div>
    </section>

    <section>
      <h2>Commandes</h2>
      <div class="card">
        <div id="ordersWrap"><div class="empty">Chargement…</div></div>
        <div class="history-total" id="ordersTotal"></div>
      </div>
    </section>
  </div>
</div>

<script>
// === À REMPLIR ===
const SUPABASE_URL = "https://tlkqcysrmkjhahhfjitu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_RM91kJNsu1bJFU1IoPPxcQ_bLTxnLgZ";
const ADMIN_PASSWORD = "we2320amse"; // mot de passe simple, pas une vraie sécurité
// ==================

const headers = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json'
};

function fmt(n){ return Number(n).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }

document.getElementById('pwBtn').addEventListener('click', () => {
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadProducts();
    loadSettings();
    loadPromoCodes();
    loadOrders();
  } else {
    document.getElementById('pwError').style.display = 'block';
  }
});

async function loadProducts(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`, { headers });
  const products = await res.json();
  const body = document.getElementById('productsBody');
  body.innerHTML = products.map(p => `
    <tr data-id="${p.id}">
      <td><input type="text" class="edit-name" value="${p.name}"></td>
      <td><input type="text" class="edit-desc" value="${p.description || ''}"></td>
      <td><input type="number" step="0.1" class="edit-price" value="${p.price}"></td>
      <td style="white-space:nowrap;">
        <button class="save-btn">Enregistrer</button>
        <button class="btn-danger delete-btn">Supprimer</button>
      </td>
    </tr>
  `).join('');

  body.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const row = e.target.closest('tr');
      const id = row.dataset.id;
      const name = row.querySelector('.edit-name').value.trim();
      const description = row.querySelector('.edit-desc').value.trim();
      const price = parseFloat(row.querySelector('.edit-price').value);
      await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
        method: 'PATCH', headers, body: JSON.stringify({ name, description, price })
      });
      btn.textContent = 'Enregistré ✓';
      setTimeout(() => btn.textContent = 'Enregistrer', 1500);
    });
  });

  body.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const row = e.target.closest('tr');
      const id = row.dataset.id;
      if(!confirm('Supprimer ce produit ?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, { method: 'DELETE', headers });
      loadProducts();
    });
  });
}

document.getElementById('addBtn').addEventListener('click', async () => {
  const name = document.getElementById('newName').value.trim();
  const description = document.getElementById('newDesc').value.trim();
  const price = parseFloat(document.getElementById('newPrice').value);
  if(!name || isNaN(price)) return alert('Nom et prix sont obligatoires.');
  await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    method: 'POST', headers: { ...headers, Prefer: 'return=minimal' },
    body: JSON.stringify({ name, description, price })
  });
  document.getElementById('newName').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newPrice').value = '';
  loadProducts();
});

let settingsId = null;

async function loadSettings(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/settings?select=*&limit=1`, { headers });
  const rows = await res.json();
  if(rows.length > 0){
    settingsId = rows[0].id;
    document.getElementById('deliveryFeeInput').value = rows[0].delivery_fee;
  }
}

document.getElementById('saveDeliveryFeeBtn').addEventListener('click', async () => {
  const fee = parseFloat(document.getElementById('deliveryFeeInput').value) || 0;
  if(settingsId){
    await fetch(`${SUPABASE_URL}/rest/v1/settings?id=eq.${settingsId}`, {
      method: 'PATCH', headers, body: JSON.stringify({ delivery_fee: fee })
    });
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
      method: 'POST', headers: { ...headers, Prefer: 'return=minimal' }, body: JSON.stringify({ delivery_fee: fee })
    });
  }
  const msg = document.getElementById('deliveryFeeMsg');
  msg.textContent = 'Enregistré ✓';
  setTimeout(() => msg.textContent = '', 2000);
  loadSettings();
});

async function loadPromoCodes(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/promo_codes?select=*&order=id.asc`, { headers });
  const codes = await res.json();
  const body = document.getElementById('promoBody');

  if(codes.length === 0){
    body.innerHTML = '<tr><td colspan="8" class="empty">Aucun code promo pour le moment.</td></tr>';
    return;
  }

  const typeLabel = { percent: '%', fixed: '€ fixe', free_delivery: 'Livraison offerte' };

  body.innerHTML = codes.map(c => {
    const valueStr = c.type === 'free_delivery' ? '—' : (c.type === 'percent' ? `${c.value}%` : `${c.value}€`);
    const usesStr = c.max_uses ? `${c.times_used}/${c.max_uses}` : `${c.times_used} (illimité)`;
    const expiresStr = c.expires_at ? new Date(c.expires_at).toLocaleDateString('fr-FR') : '—';
    return `
    <tr data-id="${c.id}">
      <td>${c.code}</td>
      <td>${typeLabel[c.type] || c.type}</td>
      <td>${valueStr}</td>
      <td>${c.min_subtotal > 0 ? fmt(c.min_subtotal) : '—'}</td>
      <td>${usesStr}</td>
      <td>${expiresStr}</td>
      <td><button class="status-badge toggle-active-btn ${c.active ? 'active' : 'inactive'}" data-active="${c.active}">${c.active ? 'Actif' : 'Inactif'}</button></td>
      <td><button class="btn-danger delete-promo-btn">Supprimer</button></td>
    </tr>`;
  }).join('');

  body.querySelectorAll('.toggle-active-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const row = e.target.closest('tr');
      const id = row.dataset.id;
      const newActive = btn.dataset.active !== 'true';
      await fetch(`${SUPABASE_URL}/rest/v1/promo_codes?id=eq.${id}`, {
        method: 'PATCH', headers, body: JSON.stringify({ active: newActive })
      });
      loadPromoCodes();
    });
  });

  body.querySelectorAll('.delete-promo-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const row = e.target.closest('tr');
      const id = row.dataset.id;
      if(!confirm('Supprimer ce code promo ?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/promo_codes?id=eq.${id}`, { method: 'DELETE', headers });
      loadPromoCodes();
    });
  });
}

document.getElementById('addPromoBtn').addEventListener('click', async () => {
  const code = document.getElementById('newPromoCode').value.trim().toUpperCase();
  const type = document.getElementById('newPromoType').value;
  const valueRaw = document.getElementById('newPromoValue').value;
  const value = type === 'free_delivery' ? null : parseFloat(valueRaw);
  const minSubtotal = parseFloat(document.getElementById('newPromoMinSubtotal').value) || 0;
  const maxUsesRaw = document.getElementById('newPromoMaxUses').value;
  const maxUses = maxUsesRaw ? parseInt(maxUsesRaw) : null;
  const expiresRaw = document.getElementById('newPromoExpires').value;
  const expiresAt = expiresRaw ? new Date(expiresRaw + 'T23:59:59').toISOString() : null;

  if(!code) return alert('Le code est obligatoire.');
  if(type !== 'free_delivery' && isNaN(value)) return alert('La valeur est obligatoire pour ce type de code.');

  await fetch(`${SUPABASE_URL}/rest/v1/promo_codes`, {
    method: 'POST', headers: { ...headers, Prefer: 'return=minimal' },
    body: JSON.stringify({
      code, type, value, active: true,
      min_subtotal: minSubtotal, max_uses: maxUses, expires_at: expiresAt
    })
  });
  document.getElementById('newPromoCode').value = '';
  document.getElementById('newPromoValue').value = '';
  document.getElementById('newPromoMinSubtotal').value = '';
  document.getElementById('newPromoMaxUses').value = '';
  document.getElementById('newPromoExpires').value = '';
  loadPromoCodes();
});

async function loadOrders(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`, { headers });
  const orders = await res.json();
  const wrap = document.getElementById('ordersWrap');
  const totalWrap = document.getElementById('ordersTotal');

  if(orders.length === 0){
    wrap.innerHTML = '<div class="empty">Aucune commande pour le moment.</div>';
    totalWrap.textContent = '';
    return;
  }

  const rows = orders.map(o => {
    const itemsStr = o.items.map(it => `${it.name} ×${it.qty}`).join(', ');
    const statusClass = o.status === 'done' ? 'done' : 'pending';
    const statusLabel = o.status === 'done' ? 'Livré' : 'À faire';
    const deliveryStr = o.delivery_mode === 'delivery' ? `Livraison — ${o.address || ''}` : 'À récupérer';
    const promoStr = o.promo_code ? `${o.promo_code} (-${fmt(o.discount)})` : '—';
    return `
      <tr>
        <td>${o.buyer_name}<br><span style="color:var(--cocoa-light); font-size:0.78rem;">${o.email || ''}</span></td>
        <td>${itemsStr}</td>
        <td>${deliveryStr}</td>
        <td>${promoStr}</td>
        <td class="amount">${fmt(o.total)}</td>
        <td><button class="status-pill ${statusClass}" data-id="${o.id}" data-status="${o.status}">${statusLabel}</button></td>
      </tr>`;
  }).join('');

  wrap.innerHTML = `<table><thead><tr><th>Nom</th><th>Commande</th><th>Récupération</th><th>Promo</th><th>Total</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table>`;
  totalWrap.textContent = `Total de toutes les commandes : ${fmt(orders.reduce((s,o) => s + Number(o.total), 0))}`;

  wrap.querySelectorAll('.status-pill').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const newStatus = btn.dataset.status === 'done' ? 'pending' : 'done';
      await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
        method: 'PATCH', headers, body: JSON.stringify({ status: newStatus })
      });
      loadOrders();
    });
  });
}
</script>
</body>
</html>
